<!DOCTYPE html>
<html>
<head>
    <title>Create Cluster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h3>Create Kubernetes Cluster</h3>

    <form method="POST" action="{{ url_for('cluster_bp.create_cluster') }}">

        <div class="mb-3">
            <label>Cluster Name</label>
            <input type="text" name="cluster_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Primary Master</label>
            <select name="primary_master" class="form-select" required>
                <option value="">Select VM</option>
                {% for vm in vms %}
                <option value="{{ vm.vmid }}">
                    {{ vm.vmname }} ({{ vm.ipaddr }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Additional Masters</label>
            <div id="additionalMastersContainer">
                <select name="additional_masters[]" class="form-select mb-2">
                    <option value="">Select VM</option>
                    {% for vm in vms %}
                    <option value="{{ vm.vmid }}">
                        {{ vm.vmname }} ({{ vm.ipaddr }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <button type="button" class="btn btn-sm btn-secondary"
                    onclick="addAdditionalMaster()">Add More</button>
        </div>

        <div class="mb-3">
            <label>Worker Nodes</label>
            <div id="workerContainer">
                <select name="worker_nodes[]" class="form-select mb-2">
                    <option value="">Select VM</option>
                    {% for vm in vms %}
                    <option value="{{ vm.vmid }}">
                        {{ vm.vmname }} ({{ vm.ipaddr }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <button type="button" class="btn btn-sm btn-secondary"
                    onclick="addWorker()">Add More</button>
        </div>

        <button type="submit" class="btn btn-success">
            Create Cluster
        </button>

        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
            Cancel
        </a>

    </form>
</div>

<script>
function addAdditionalMaster() {
    let container = document.getElementById("additionalMastersContainer");
    let select = container.querySelector("select").cloneNode(true);
    select.value = "";
    container.appendChild(select);
}

function addWorker() {
    let container = document.getElementById("workerContainer");
    let select = container.querySelector("select").cloneNode(true);
    select.value = "";
    container.appendChild(select);
}
</script>

</body>
</html>
