- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Configure nginx.conf
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  become: yes

- name: Ensure NGINX SSL directory exists
  file:
    path: /etc/nginx/ssl
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Generate self-signed SSL certificate (if not exists)
  command: >
    openssl req -x509 -nodes -days 365
    -newkey rsa:2048
    -keyout /etc/nginx/ssl/selfsigned.key
    -out /etc/nginx/ssl/selfsigned.crt
    -subj "/CN=localhost"
  args:
    creates: /etc/nginx/ssl/selfsigned.crt

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: yes
    state: started

